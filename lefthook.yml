# lefthook pre-commit hooks for claude-pty.
# All three checks are fast and run in parallel; any failure blocks the commit.
# Docs: https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  jobs:
    - name: check
      run: bun run check
    - name: check-types
      run: bun run check-types
    - name: test
      run: bun run test
