name: Release

# Manually triggered. Bumps the package version, tags it, builds a per-OS
# binary archive (binary + bundled node-pty) on a native runner for each OS,
# and publishes a GitHub Release with all archives attached.
#
# Version flows: prepare (bump + tag + push) -> build (checks out the tag) ->
# release (attaches artifacts to the tag's release).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for this release"
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  prepare:
    name: Bump version & tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need write access to push the bump commit + tag back.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION="$(npm version ${{ inputs.bump }} --no-git-tag-version)"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${VERSION}"
          git tag "${VERSION}"
          # Releases run from master; push the bump commit and tag there.
          # If dispatched from another ref, push to that ref instead.
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${VERSION}"

  build:
    name: Build ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
          - os: macos-latest # arm64
          - os: macos-13 # x64
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        # Installs/builds the node-pty matching THIS runner's OS/arch (on linux
        # it builds from source via node-gyp; win/mac use shipped prebuilds).
        run: bun install

      - name: Package release archive
        run: bun run scripts/package-release.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
